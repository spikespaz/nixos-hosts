name: Nix Build
description: Build a nix attribute and expose dedup metadata for a downstream upload

inputs:
  attr:
    description: "Nix attribute to build"
    required: true
  artifact-name:
    description: "Logical artifact name — used to look up an existing un-expired artifact for dedup, and to slice per-variant lines out of the shared post-build-hook log"
    required: true

outputs:
  hash:
    description: "First segment of the derivation basename (its input hash), stable across re-runs of the same inputs"
    value: ${{ steps.drv-hash.outputs.hash }}
  drvname:
    description: "Derivation name portion of the drv basename (everything after the hash-). Pair with an extension to form a user-facing filename."
    value: ${{ steps.drv-hash.outputs.drvname }}
  skipped:
    description: "`true` when an existing un-expired artifact for artifact-name+hash was found and the build was skipped"
    value: ${{ steps.check-existing.outputs.skipped }}
  dedup-url:
    description: "Link to the existing artifact when `skipped` is `true`; empty otherwise"
    value: ${{ steps.check-existing.outputs.dedup-url }}

runs:
  using: composite
  steps:
    - name: Compute derivation hash
      id: drv-hash
      shell: bash
      run: |
        drv_path=$(nix eval --raw '.#${{ inputs.attr }}.drvPath' 2>/dev/null || echo "unknown")
        drv_base=$(basename "$drv_path" .drv)
        drv_hash=${drv_base%%-*}
        drv_name=${drv_base#*-}
        echo "hash=$drv_hash" >> "$GITHUB_OUTPUT"
        echo "drvname=$drv_name" >> "$GITHUB_OUTPUT"
        echo "Cache key: drv-$drv_hash"

    - name: Check for existing artifact
      id: check-existing
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        artifact_name="${{ inputs.artifact-name }}-${{ steps.drv-hash.outputs.hash }}"
        existing=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=$artifact_name" \
          --jq '[.artifacts[] | select(.expired == false) | .id][0] // empty' \
          2>/dev/null)
        if [ -n "$existing" ]; then
          run_id=$(gh api "repos/${{ github.repository }}/actions/artifacts/$existing" \
            --jq '.workflow_run.id' 2>/dev/null)
          url="https://github.com/${{ github.repository }}/actions/runs/${run_id}/artifacts/$existing"
          echo "Artifact '$artifact_name' already exists: $url"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "dedup-url=$url" >> "$GITHUB_OUTPUT"
        else
          echo "No existing artifact for '$artifact_name'. Building."
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        fi

    - name: "Build ${{ inputs.artifact-name }}"
      if: steps.check-existing.outputs.skipped != 'true'
      shell: bash
      run: |
        # Snapshot the post-build-hook log so the downstream nix-upload
        # summary can slice out just the paths realized by this variant.
        # `trap ... EXIT` captures the slice even when `nix build` fails,
        # so the summary on a broken run still shows what got partially
        # realized before the failure.
        log='/tmp/nix-built-paths-${{ inputs.artifact-name }}.log'
        before=$(wc -l < /tmp/nix-built-paths.log 2>/dev/null || echo 0)
        trap 'tail -n +$((before + 1)) /tmp/nix-built-paths.log > "$log" 2>/dev/null || true' EXIT
        nix build '.#${{ inputs.attr }}' \
          --out-link 'result-${{ inputs.artifact-name }}' \
          --print-build-logs
