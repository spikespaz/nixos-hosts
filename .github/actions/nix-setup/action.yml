name: Nix Setup
description: Install Nix, restore and import local binary cache

inputs:
  cache-name:
    description: "Cache key prefix for actions/cache"
    required: true
  nix-conf:
    description: "Extra nix.conf lines (appended to defaults)"
    required: false
    default: ""
  nix-copy-jobs:
    description: "Parallelism for `nix copy --from` (passed as `--option max-substitution-jobs`). Default matches the 4 vCPUs on standard public-repo GHA runners."
    required: false
    default: "4"

runs:
  using: composite
  steps:
    # Install the post-build-hook at a fixed path with +x so Nix can
    # exec it. The hook appends $OUT_PATHS to /tmp/nix-built-paths.log,
    # which nix-cache-export consumes to learn what to copy.
    - name: Install post-build-hook
      shell: bash
      run: |
        install -m 0755 '${{ github.action_path }}/post-build-hook.sh' /tmp/nix-post-build-hook.sh
        : > /tmp/nix-built-paths.log

    # Hosted GHA runners expose ~14 GB free on / but ~70 GB on /mnt
    # (the Azure VM's ephemeral data disk). Full multi-variant brdboot
    # closures plus systemd-repart/mkfs scratch can hit ENOSPC on /
    # (observed 2026-04 on build-brdboot sealed variant, run 24873426263
    # at 62abf63). Bind-mount /mnt/nix → /nix before nix-quick-install
    # lays the store down so /nix/store and build scratch live on the
    # larger disk. Degrade cleanly on runner configurations that lack
    # a writable /mnt instead of failing the job.
    - name: Move /nix to /mnt for disk headroom
      shell: bash
      run: |
        summary="$GITHUB_STEP_SUMMARY"
        echo "### Disk layout (pre-build)" >> "$summary"
        root_avail=$(df -h --output=avail / | tail -1 | tr -d ' ')
        if [ -d /mnt ] && sudo test -w /mnt; then
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
          sudo chown "$(id -u):$(id -g)" /nix
          mnt_avail=$(df -h --output=avail /mnt | tail -1 | tr -d ' ')
          echo "Bind-mounted \`/mnt/nix\` → \`/nix\`." >> "$summary"
          echo "\`/\` free: $root_avail &middot; \`/mnt\` free: $mnt_avail" >> "$summary"
        else
          echo "No writable \`/mnt\` — nix store stays on \`/\` ($root_avail free)." >> "$summary"
        fi

    - uses: nixbuild/nix-quick-install-action@v32
      with:
        nix_conf: |
          pure-eval = true
          allow-import-from-derivation = false
          post-build-hook = /tmp/nix-post-build-hook.sh
          ${{ inputs.nix-conf }}

    # Restore only; the save half lives in nix-cache-export so it can
    # be gated on whether any new paths were actually copied.
    - uses: actions/cache/restore@v4
      id: cache
      with:
        path: /tmp/nix-binary-cache
        key: nix-${{ inputs.cache-name }}-${{ github.sha }}
        restore-keys: |
          nix-${{ inputs.cache-name }}-

    - name: Import from local cache
      shell: bash
      run: |
        summary="$GITHUB_STEP_SUMMARY"
        matched='${{ steps.cache.outputs.cache-matched-key }}'
        primary='${{ steps.cache.outputs.cache-primary-key }}'
        hit='${{ steps.cache.outputs.cache-hit }}'
        echo "### Binary cache" >> "$summary"
        if [ -f "/tmp/nix-binary-cache/nix-cache-info" ]; then
          echo "Importing from local binary cache..."
          nix copy --option max-substitution-jobs ${{ inputs.nix-copy-jobs }} --from "file:///tmp/nix-binary-cache" --all --no-check-sigs || true
          if [ "$hit" = "true" ]; then
            echo "Restored from \`$matched\` (exact match)." >> "$summary"
          else
            echo "Primary key \`$primary\` missed; restored from \`$matched\` via \`restore-keys\` fallback." >> "$summary"
          fi
        else
          echo "No local cache found."
          echo "Cold start — no match for primary key \`$primary\` or prefix \`nix-${{ inputs.cache-name }}-\`." >> "$summary"
        fi
