name: Nix Cache Export
description: Export nix store closures to local binary cache with budget pruning

inputs:
  cache-name:
    description: "Cache key prefix — must match the value passed to nix-setup"
    required: true
  cache-max-mb:
    description: "Max binary cache size in MB before LRU-by-write prune engages (0 = no limit)"
    required: false
    default: "6144"

runs:
  using: composite
  steps:
    - name: Export closures to local cache
      id: export
      shell: bash
      run: |
        LOCAL_CACHE="/tmp/nix-binary-cache"
        mkdir -p "$LOCAL_CACHE"

        # Walk the build-time closure of each result symlink's
        # deriver and copy it, minus the top-level outputs (which
        # already ship as artifacts). `nix path-info --recursive`
        # would give only the runtime closure, which is empty for
        # a .raw image.
        exclude_file=$(mktemp)
        trap 'rm -f "$exclude_file"' EXIT

        drvs=()
        for link in result result-*; do
          if [ ! -L "$link" ]; then continue; fi
          readlink -f "./$link" >> "$exclude_file"
          drv=$(nix-store --query --deriver "./$link" 2>/dev/null || true)
          if [ -n "$drv" ] && [ "$drv" != "unknown-deriver" ]; then
            drvs+=("$drv")
          fi
        done

        exported=false
        if [ "${#drvs[@]}" -eq 0 ]; then
          echo "No result symlinks with derivers found — nothing to export."
        else
          echo "Collecting build-time closure of ${#drvs[@]} deriver(s)..."
          paths=$(nix-store --query --requisites --include-outputs \
              "${drvs[@]}" 2>/dev/null \
            | grep -Fxvf "$exclude_file" || true)
          if [ -n "$paths" ]; then
            count=$(echo "$paths" | wc -l)
            echo "Copying $count path(s) to $LOCAL_CACHE..."
            # shellcheck disable=SC2086
            nix copy --to "file://$LOCAL_CACHE" $paths 2>/dev/null || true
            exported=true
          else
            echo "Build-time closure was empty after excluding top-level outputs."
          fi
        fi
        echo "exported=$exported" >> "$GITHUB_OUTPUT"

        CACHE_MAX_MB=${{ inputs.cache-max-mb }}
        if [ "$CACHE_MAX_MB" -gt 0 ] 2>/dev/null; then
          cache_mb=$(du -sm "$LOCAL_CACHE" | cut -f1)
          echo "Cache size: ${cache_mb}MB (budget: ${CACHE_MAX_MB}MB)"
          if [ "$cache_mb" -gt "$CACHE_MAX_MB" ]; then
            echo "Pruning oldest NARs..."
            while [ "$(du -sm "$LOCAL_CACHE" | cut -f1)" -gt "$CACHE_MAX_MB" ]; do
              # awk not head: head closes the pipe early, SIGPIPE
              # on sort propagates via pipefail as a non-zero exit.
              oldest=$(find "$LOCAL_CACHE/nar" -name '*.nar.*' \
                  -printf '%T+ %p\n' 2>/dev/null \
                | sort \
                | awk 'NR==1 {print $2}') || oldest=""
              if [ -z "$oldest" ]; then break; fi
              rm -f "$oldest"
            done
            # Drop narinfo stubs whose NAR was evicted.
            for ni in "$LOCAL_CACHE"/*.narinfo; do
              [ -f "$ni" ] || continue
              nar_url=$(grep '^URL:' "$ni" | sed 's|^URL: ||') || nar_url=""
              if [ -n "$nar_url" ] && [ ! -f "$LOCAL_CACHE/$nar_url" ]; then
                rm -f "$ni"
              fi
            done
            cache_mb=$(du -sm "$LOCAL_CACHE" | cut -f1)
            echo "Cache after pruning: ${cache_mb}MB"
            # Fail loud if prune couldn't catch up, with a hint for
            # bumping the budget.
            if [ "$cache_mb" -gt "$CACHE_MAX_MB" ]; then
              suggested=$(( (cache_mb / 1024 + 2) * 1024 ))
              echo "::error::Cache size ${cache_mb}MB still exceeds budget ${CACHE_MAX_MB}MB after pruning."
              echo "::error::Bump \`cache-max-mb\` input to at least ${suggested}, or reduce the closure."
              exit 1
            fi
          fi
        fi

    # Skip the save when nothing was exported — otherwise we'd write
    # an empty cache under this sha's key and poison restore-keys
    # prefix matching on the next run.
    - name: Save cache
      if: steps.export.outputs.exported == 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/nix-binary-cache
        key: nix-${{ inputs.cache-name }}-${{ github.sha }}
