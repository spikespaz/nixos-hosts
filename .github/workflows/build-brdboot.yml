name: Build brdboot images

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/brdboot/**"
      - ".github/actions/**"
      - ".github/workflows/build-brdboot.yml"
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/brdboot/**"
      - ".github/actions/**"
      - ".github/workflows/build-brdboot.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  brd-portable-x86_64:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # systemd-repart (used by mutable, immutable, sealed variants)
      # calls unshare(2) to create user namespaces for fakeroot.
      # Ubuntu 24.04 restricts this via AppArmor by default.
      # Without this sysctl, repart builds fail with:
      #   unshare: write failed /proc/self/uid_map: Operation not permitted
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: brdboot-x86_64

      - name: Build ephemeral-x86_64-linux
        id: build-ephemeral
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.brdboot.config.system.build.images.ephemeral
          artifact-name: ephemeral-x86_64-linux

      - name: Upload ephemeral-x86_64-linux
        if: always()
        uses: ./.github/actions/nix-upload
        with:
          artifact-name: ephemeral-x86_64-linux
          artifact-path: result-ephemeral-x86_64-linux/iso/*.iso
          hash: ${{ steps.build-ephemeral.outputs.hash }}
          drvname: ${{ steps.build-ephemeral.outputs.drvname }}
          skipped: ${{ steps.build-ephemeral.outputs.skipped }}
          dedup-url: ${{ steps.build-ephemeral.outputs.dedup-url }}

      - name: Build mutable-x86_64-linux
        id: build-mutable
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.brdboot.config.system.build.images.mutable
          artifact-name: mutable-x86_64-linux

      - name: Upload mutable-x86_64-linux
        if: always()
        uses: ./.github/actions/nix-upload
        with:
          artifact-name: mutable-x86_64-linux
          artifact-path: result-mutable-x86_64-linux/*.raw
          hash: ${{ steps.build-mutable.outputs.hash }}
          drvname: ${{ steps.build-mutable.outputs.drvname }}
          skipped: ${{ steps.build-mutable.outputs.skipped }}
          dedup-url: ${{ steps.build-mutable.outputs.dedup-url }}

      # The verity-store module builds a three-derivation pipeline:
      #   intermediateImage (partitions minus ESP)
      #     → uki (cmdline bakes root hash extracted from intermediate)
      #       → finalImage (injects UKI into ESP)
      # The regular system.build.image of the immutable variant is
      # non-bootable (empty ESP) by design — we build finalImage.
      - name: Build immutable-x86_64-linux
        id: build-immutable
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.brdboot.config.system.build.images.immutable.passthru.config.system.build.finalImage
          artifact-name: immutable-x86_64-linux

      - name: Upload immutable-x86_64-linux
        if: always()
        uses: ./.github/actions/nix-upload
        with:
          artifact-name: immutable-x86_64-linux
          artifact-path: result-immutable-x86_64-linux/*.raw
          hash: ${{ steps.build-immutable.outputs.hash }}
          drvname: ${{ steps.build-immutable.outputs.drvname }}
          skipped: ${{ steps.build-immutable.outputs.skipped }}
          dedup-url: ${{ steps.build-immutable.outputs.dedup-url }}

      - name: Build sealed-x86_64-linux
        id: build-sealed
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.brdboot.config.system.build.images.sealed
          artifact-name: sealed-x86_64-linux

      - name: Upload sealed-x86_64-linux
        if: always()
        uses: ./.github/actions/nix-upload
        with:
          artifact-name: sealed-x86_64-linux
          artifact-path: result-sealed-x86_64-linux/*.raw
          hash: ${{ steps.build-sealed.outputs.hash }}
          drvname: ${{ steps.build-sealed.outputs.drvname }}
          skipped: ${{ steps.build-sealed.outputs.skipped }}
          dedup-url: ${{ steps.build-sealed.outputs.dedup-url }}

      # Export all build closures (excluding the images themselves) to
      # a local binary cache for the next run.
      - name: Export binary cache
        uses: ./.github/actions/nix-cache-export
        if: always()
        with:
          cache-name: brdboot-x86_64

  brd-portable-aarch64:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'aarch64-checks'))
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: brdboot-aarch64

      - name: Build ephemeral-aarch64-linux
        id: build-ephemeral
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.brdboot-aarch64.config.system.build.images.ephemeral
          artifact-name: ephemeral-aarch64-linux

      - name: Upload ephemeral-aarch64-linux
        if: always()
        uses: ./.github/actions/nix-upload
        with:
          artifact-name: ephemeral-aarch64-linux
          artifact-path: result-ephemeral-aarch64-linux/iso/*.iso
          hash: ${{ steps.build-ephemeral.outputs.hash }}
          drvname: ${{ steps.build-ephemeral.outputs.drvname }}
          skipped: ${{ steps.build-ephemeral.outputs.skipped }}
          dedup-url: ${{ steps.build-ephemeral.outputs.dedup-url }}

      - uses: ./.github/actions/nix-cache-export
        if: always()
        with:
          cache-name: brdboot-aarch64
