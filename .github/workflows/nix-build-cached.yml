# Reusable nix build with binary cache, artifact deduplication, and budget eviction.
# Callers must add their own draft-PR guard — this workflow cannot access
# github.event.pull_request.draft from a workflow_call context.
# Example: if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
name: Nix Build (cached, deduplicated)

on:
  workflow_call:
    inputs:
      attr:
        description: "Nix attribute to build"
        required: true
        type: string
      artifact-name:
        description: "Base name for the artifact"
        required: true
        type: string
      artifact-path:
        description: "Glob path to upload from result"
        required: true
        type: string
      retention-days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 7
      cache-max-mb:
        description: "Max binary cache size in MB (0 = no limit)"
        required: false
        type: number
        default: 1024
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
      sandbox:
        description: "Nix sandbox mode (true, false, relaxed)"
        required: false
        type: string
        default: "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable unprivileged user namespaces
        if: inputs.sandbox == 'false'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: ${{ inputs.artifact-name }}

      - uses: ./.github/actions/nix-build
        with:
          attr: ${{ inputs.attr }}
          artifact-name: ${{ inputs.artifact-name }}
          artifact-path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}

      - uses: ./.github/actions/nix-cache-export
        if: always()
        with:
          cache-max-mb: ${{ inputs.cache-max-mb }}
