# Reusable nix build with binary cache, artifact deduplication, and budget eviction.
# Callers must add their own draft-PR guard — this workflow cannot access
# github.event.pull_request.draft from a workflow_call context.
# Example: if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
name: Nix Build (cached, deduplicated)

on:
  workflow_call:
    inputs:
      attr:
        description: "Nix attribute to build"
        required: true
        type: string
      artifact-name:
        description: "Base name for the artifact"
        required: true
        type: string
      artifact-path:
        description: "Glob path to upload from result"
        required: true
        type: string
      retention-days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 7
      cache-max-mb:
        description: "Max binary cache size in MB (0 = no limit)"
        required: false
        type: number
        default: 1024
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
      sandbox:
        description: "Nix sandbox mode (true, false, relaxed)"
        required: false
        type: string
        default: "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable unprivileged user namespaces
        if: inputs.sandbox == 'false'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: ${{ inputs.artifact-name }}

      - uses: ./.github/actions/nix-build
        with:
          attr: ${{ inputs.attr }}
          artifact-name: ${{ inputs.artifact-name }}
          artifact-path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}

      - name: Export closure to local cache
        if: always()
        run: |
          LOCAL_CACHE="/tmp/nix-binary-cache"
          mkdir -p "$LOCAL_CACHE"
          for link in result result-*; do
            if [ ! -L "$link" ]; then continue; fi
            for path in $(nix path-info --recursive "./$link" 2>/dev/null \
                | grep -v "$(readlink -f "./$link")"); do
              nix copy --to "file://$LOCAL_CACHE" "$path" 2>/dev/null || true
            done
          done

          CACHE_MAX_MB=${{ inputs.cache-max-mb }}
          if [ "$CACHE_MAX_MB" -gt 0 ] 2>/dev/null; then
            cache_mb=$(du -sm "$LOCAL_CACHE" | cut -f1)
            echo "Cache size: ${cache_mb}MB (budget: ${CACHE_MAX_MB}MB)"
            if [ "$cache_mb" -gt "$CACHE_MAX_MB" ]; then
              echo "Pruning oldest NARs..."
              while [ "$(du -sm "$LOCAL_CACHE" | cut -f1)" -gt "$CACHE_MAX_MB" ]; do
                oldest=$(find "$LOCAL_CACHE/nar" -name '*.nar.*' -printf '%T+ %p\n' \
                  2>/dev/null | sort 2>/dev/null | head -1 | cut -d' ' -f2)
                if [ -z "$oldest" ]; then break; fi
                rm -f "$oldest"
              done
              for ni in "$LOCAL_CACHE"/*.narinfo; do
                nar_url=$(grep "^URL:" "$ni" 2>/dev/null | sed 's|^URL: ||')
                if [ -n "$nar_url" ] && [ ! -f "$LOCAL_CACHE/$nar_url" ]; then
                  rm -f "$ni"
                fi
              done
              echo "Cache after pruning: $(du -sm "$LOCAL_CACHE" | cut -f1)MB"
            fi
          fi
