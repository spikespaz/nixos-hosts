name: Build birdboot-portable images

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/actions/**"
      - ".github/workflows/build-birdboot-portable.yml"
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/actions/**"
      - ".github/workflows/build-birdboot-portable.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bb-portable-x86_64:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # systemd-repart (used by mutable, immutable, sealed variants)
      # calls unshare(2) to create user namespaces for fakeroot.
      # Ubuntu 24.04 restricts this via AppArmor by default.
      # Without this sysctl, repart builds fail with:
      #   unshare: write failed /proc/self/uid_map: Operation not permitted
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: birdboot-x86_64

      - name: ephemeral-x86_64-linux
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.birdboot-portable.config.system.build.images.ephemeral
          artifact-name: ephemeral-x86_64-linux
          artifact-path: result-ephemeral-x86_64-linux/iso/*.iso

      - name: mutable-x86_64-linux
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.birdboot-portable.config.system.build.images.mutable
          artifact-name: mutable-x86_64-linux
          artifact-path: result-mutable-x86_64-linux/*.raw

      - name: immutable-x86_64-linux
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.birdboot-portable.config.system.build.images.immutable
          artifact-name: immutable-x86_64-linux
          artifact-path: result-immutable-x86_64-linux/*.raw

      - name: sealed-x86_64-linux
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.birdboot-portable.config.system.build.images.sealed
          artifact-name: sealed-x86_64-linux
          artifact-path: result-sealed-x86_64-linux/*.raw

      # Export all build closures (excluding the images themselves) to
      # a local binary cache for the next run. Budget: 2GB covers the
      # shared dependency closure across all four variants.
      - name: Export binary cache
        uses: ./.github/actions/nix-cache-export
        if: always()
        with:
          cache-max-mb: "2048"

  bb-portable-aarch64:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'aarch64-checks'))
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/nix-setup
        with:
          cache-name: birdboot-aarch64

      - name: ephemeral-aarch64-linux
        uses: ./.github/actions/nix-build
        with:
          attr: nixosConfigurations.birdboot-portable-aarch64.config.system.build.images.ephemeral
          artifact-name: ephemeral-aarch64-linux
          artifact-path: result-ephemeral-aarch64-linux/iso/*.iso

      - uses: ./.github/actions/nix-cache-export
        if: always()
        with:
          cache-max-mb: "2048"
