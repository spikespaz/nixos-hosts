name: Build birdboot-portable images

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/workflows/build-birdboot-portable.yml"
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/workflows/build-birdboot-portable.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    name: iso-impermanent (x86_64-linux)
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v32
      - name: Build iso-impermanent
        run: >
          nix build
          .#nixosConfigurations.birdboot-portable.config.system.build.images.iso-impermanent
          --print-build-logs

  build-aarch64:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'aarch64-checks'))
    runs-on: ubuntu-24.04-arm
    name: iso-impermanent (aarch64-linux)
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v32
      - name: Build iso-impermanent
        run: >
          nix build
          .#nixosConfigurations.birdboot-portable-aarch64.config.system.build.images.iso-impermanent
          --print-build-logs
