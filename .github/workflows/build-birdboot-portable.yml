name: Build birdboot-portable images

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/workflows/build-birdboot-portable.yml"
      - ".github/workflows/nix-build-cached.yml"
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/birdboot/**"
      - ".github/workflows/build-birdboot-portable.yml"
      - ".github/workflows/nix-build-cached.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-x86_64:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    uses: ./.github/workflows/nix-build-cached.yml
    with:
      attr: nixosConfigurations.birdboot-portable.config.system.build.images.iso-impermanent
      artifact-name: iso-impermanent-x86_64-linux
      artifact-path: result/iso/*.iso
      runner: ubuntu-latest

  build-aarch64:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'aarch64-checks'))
    uses: ./.github/workflows/nix-build-cached.yml
    with:
      attr: nixosConfigurations.birdboot-portable-aarch64.config.system.build.images.iso-impermanent
      artifact-name: iso-impermanent-aarch64-linux
      artifact-path: result/iso/*.iso
      runner: ubuntu-24.04-arm
